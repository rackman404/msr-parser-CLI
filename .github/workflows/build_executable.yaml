name: Build Executable

# https://github.com/github/vscode-github-actions/issues/47, for suppressing warnings in github actions vscode extension
env: 
  now: ""
  nowtag: ""

# Controls when the action will run. Workflow runs when manually triggered using the UI
# or API.
on:
  workflow_dispatch:
    # Inputs the workflow accepts.
    inputs:
      release-description:
        # Friendly description to be shown in the UI instead of 'name'
        description: 'Release Description'
        # Default value if no value is explicitly provided
        default: 'Default Value'
        # Input has to be provided for the workflow to run
        required: false
        # The data type of the input
        type: string

jobs:
  unit_test:
    uses: ./.github/workflows/test_suite.yaml
    secrets: #inherit
      GIST_TOKEN: ${{ secrets.GIST_TOKEN }}

  build:
    name: "Python CLI Build"
    needs: unit_test
    runs-on: "${{ matrix.os }}"

    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
        python-version:
          - "3.12"

    steps:
      - name: "Check out the repo"
        uses: "actions/checkout@v2"

      - name: "Set up Python"
        uses: "actions/setup-python@v2"
        with:
          python-version: "${{ matrix.python-version }}"

      - name: "Install Project Libraries"
        run: |
          python -m pip install -r requirements.txt

      - name: "Run Build Script"
        run: |
          cd "Batch Files"
          ./build_no_venv.bat
          cd ..

      - name: copy build to build folder
        run: | 
          cd ./_PYINSTALLER/
          robocopy "./dist" "../build/" /MIR
          if ($lastexitcode -lt 8) { $global:LASTEXITCODE = $null }
          cd ..
      - name: Compress build to zip
        run: | 
          Compress-Archive ./build ./build.zip
          dir

      - name: "Upload build"
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: build.zip
  
  release:
    name: Release
    needs: build
    runs-on: windows-latest

    permissions:
      contents: write
    strategy:
      fail-fast: false
    
    steps:
      #https://stackoverflow.com/questions/76596124/get-current-date-in-github-workflows-windows
      - name: Put current UTC date into a variable
        run: |
          $NOW=& Get-Date -format yyyy-MM-dd
          echo "now=$NOW" >> $env:GITHUB_ENV
          echo $NOW
          $NOWTAG=& Get-Date -format yyyy-MM-dd-mm
          echo "nowtag=$NOWTAG" >> $env:GITHUB_ENV
          echo $NOWTAG

      #- name: Debug env
      #  run: |
      #    echo "now=${{ env.now }}"
      #    echo "nowtag=${{ env.nowtag }}"
      #    echo "nowtag=$nowtag"

      - name: create release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # This token is provided by Actions, you do not need to create your own token
        with:
          tag_name: ${{ env.nowtag }}-CLI
          release_name: ${{ env.now }}-Downloader-CLI
          body: |
            ${{ github.event.inputs.release-description }}
            Release Generated by github action script
          draft: true
          prerelease: false

      - name: "Download build"
        uses: actions/download-artifact@v4
        with:
          name: build

      - name: Upload Release Asset (windows)
        id: upload-release-asset-windows
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }} # This pulls from the CREATE RELEASE step above, referencing it's ID to get its outputs object, which include a `upload_url`. See this blog post for more info: https://jasonet.co/posts/new-features-of-github-actions/#passing-data-to-future-steps 
          asset_path: build.zip
          asset_name: build.zip
          asset_content_type: application/zip
